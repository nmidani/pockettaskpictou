packages:
  "react-map-gl": "React wrapper for Mapbox GL"
  "mapbox-gl": "Mapbox GL JS for map view"
  "framer-motion": "Smooth page transitions and micro-interactions"
  "date-fns": "For formatting task creation and deadline dates"
  "react-hook-form": "Form state management"
  "@hookform/resolvers": "Zod resolver for forms"

images:
  - path: "artifacts/pockettask/public/images/hero-community.png"
    description: "Vector illustration of a friendly diverse community in a coastal town helping each other, warm teal and sun-yellow colors, clean minimal style, soft lighting"
    aspect_ratio: "16:9"
  - path: "artifacts/pockettask/public/images/logo.png"
    description: "Minimal geometric logo mark representing a pocket and a checkmark, warm teal color, transparent background"
    aspect_ratio: "1:1"
  - path: "artifacts/pockettask/public/images/empty-state.png"
    description: "Soft vector illustration of an empty clipboard with a magnifying glass, warm pastel colors, minimal flat design"
    aspect_ratio: "1:1"

notes:
  - VITE_MAPBOX_TOKEN must be set in the environment variables for the map to work.
  - Using Replit Auth web package for authentication flows.
