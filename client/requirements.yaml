packages:
  "framer-motion": "For beautiful page transitions and micro-interactions"
  "react-map-gl": "Mapbox GL React wrapper for the map view"
  "mapbox-gl": "Peer dependency for react-map-gl"
  "date-fns": "For formatting human-readable dates and relative times"
  "clsx": "For conditional class merging in UI components"
  "tailwind-merge": "For merging Tailwind classes safely in UI components"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For Zod schema validation with forms"

images:
  - path: "client/public/images/hero-community.png"
    description: "A beautiful, warm illustration of a friendly coastal Canadian town community (Pictou County style) with people helping each other, vibrant colors, flat vector illustration style with gradients, deep teal and warm golden yellow accents"
    aspect_ratio: "16:9"
  - path: "client/public/images/empty-tasks.png"
    description: "A cute, stylized illustration of a clipboard and a magnifying glass looking for tasks, friendly modern vector art, deep teal and soft blue colors"
    aspect_ratio: "1:1"
  - path: "client/public/images/logo-icon.png"
    description: "A modern, minimalist logo for a community task app, featuring a subtle map pin and a checkmark integrated together. Deep teal and golden yellow. Transparent background."
    aspect_ratio: "1:1"

notes:
  - "The app uses Replit Auth. Login redirects to /api/login."
  - "Mapbox token required in VITE_MAPBOX_TOKEN for MapView to function."
  - "API paths are based on the provided openapi.yaml structure."
  - "Chat uses polling (refetchInterval) since WebSocket endpoints weren't explicitly defined in the OpenAPI spec."
