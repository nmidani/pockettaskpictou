openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: PocketTask API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: tasks
  - name: applications
  - name: users
  - name: messages
  - name: ratings
  - name: reports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      operationId: getCurrentAuthUser
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current auth user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentAuthUserResponse"

  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: town
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          description: Unauthorized

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskWithDetails"
        "404":
          description: Not found
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /tasks/{id}/claim:
    post:
      operationId: claimTask
      tags: [tasks]
      summary: Claim a task (first-come first-served)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "409":
          description: Already claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tasks/{id}/complete:
    post:
      operationId: completeTask
      tags: [tasks]
      summary: Mark task as completed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/applications:
    get:
      operationId: getTaskApplications
      tags: [applications]
      summary: Get applications for a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationListResponse"
    post:
      operationId: applyToTask
      tags: [applications]
      summary: Apply to a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyToTaskBody"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}:
    patch:
      operationId: updateApplication
      tags: [applications]
      summary: Accept/reject application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationBody"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /messages/{taskId}:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get messages for a task chat
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResponse"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in task chat
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /ratings:
    post:
      operationId: submitRating
      tags: [ratings]
      summary: Submit a rating after task completion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitRatingBody"
      responses:
        "201":
          description: Rating submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatingResponse"

  /ratings/{userId}:
    get:
      operationId: getUserRatings
      tags: [ratings]
      summary: Get ratings for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User ratings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRatingsResponse"

  /reports:
    post:
      operationId: submitReport
      tags: [reports]
      summary: Submit a report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitReportBody"
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/me:
    get:
      operationId: getMyProfile
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateMyProfile
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/me/tasks:
    get:
      operationId: getMyPostedTasks
      tags: [users]
      summary: Get tasks posted by current user
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"

  /users/me/applications:
    get:
      operationId: getMyApplications
      tags: [users]
      summary: Get applications by current user
      responses:
        "200":
          description: Applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationListResponse"

  /users/me/messages:
    get:
      operationId: getMyConversations
      tags: [messages]
      summary: Get all task conversations for current user
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationListResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    GetCurrentAuthUserResponse:
      type: object
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"
      required: [user]

    AuthUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImage:
          type: string
          nullable: true
      required: [id, username]

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        pay:
          type: number
        paymentMethod:
          type: string
          enum: [cash, etransfer]
        estimatedHours:
          type: number
          nullable: true
        status:
          type: string
          enum: [open, claimed, in_progress, completed, cancelled]
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        locationName:
          type: string
          nullable: true
        town:
          type: string
          nullable: true
        postedById:
          type: string
        claimedById:
          type: string
          nullable: true
        claimedAt:
          type: string
          format: date-time
          nullable: true
        assignedToId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, description, category, pay, paymentMethod, status, postedById, createdAt, updatedAt]

    TaskWithDetails:
      allOf:
        - $ref: "#/components/schemas/Task"
        - type: object
          properties:
            postedBy:
              $ref: "#/components/schemas/AuthUser"
            claimedBy:
              oneOf:
                - $ref: "#/components/schemas/AuthUser"
                - type: "null"
            applicationCount:
              type: integer
          required: [postedBy, applicationCount]

    TaskListResponse:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
      required: [tasks]

    CreateTaskBody:
      type: object
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          minLength: 10
        category:
          type: string
        pay:
          type: number
          minimum: 1
        paymentMethod:
          type: string
          enum: [cash, etransfer]
        estimatedHours:
          type: number
          nullable: true
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        locationName:
          type: string
          nullable: true
        town:
          type: string
          nullable: true
      required: [title, description, category, pay]

    UpdateTaskBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        pay:
          type: number
        paymentMethod:
          type: string
          enum: [cash, etransfer]
        status:
          type: string
          enum: [open, claimed, in_progress, completed, cancelled]
        estimatedHours:
          type: number
          nullable: true
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        locationName:
          type: string
          nullable: true
        town:
          type: string
          nullable: true

    Application:
      type: object
      properties:
        id:
          type: integer
        taskId:
          type: integer
        applicantId:
          type: string
        message:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string
          format: date-time
        applicant:
          $ref: "#/components/schemas/AuthUser"
        task:
          oneOf:
            - $ref: "#/components/schemas/Task"
            - type: "null"
      required: [id, taskId, applicantId, status, createdAt, applicant]

    ApplicationListResponse:
      type: object
      properties:
        applications:
          type: array
          items:
            $ref: "#/components/schemas/Application"
      required: [applications]

    ApplyToTaskBody:
      type: object
      properties:
        message:
          type: string
          nullable: true

    UpdateApplicationBody:
      type: object
      properties:
        status:
          type: string
          enum: [accepted, rejected]
      required: [status]

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        taskId:
          type: integer
        senderId:
          type: string
        content:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
        sender:
          $ref: "#/components/schemas/AuthUser"
      required: [id, taskId, senderId, content, read, createdAt, sender]

    MessageListResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required: [messages]

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
          minLength: 1
      required: [content]

    Conversation:
      type: object
      properties:
        taskId:
          type: integer
        taskTitle:
          type: string
        otherUser:
          $ref: "#/components/schemas/AuthUser"
        lastMessage:
          type: string
          nullable: true
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
        unreadCount:
          type: integer
      required: [taskId, taskTitle, otherUser, unreadCount]

    ConversationListResponse:
      type: object
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"
      required: [conversations]

    RatingResponse:
      type: object
      properties:
        id:
          type: integer
        taskId:
          type: integer
        raterId:
          type: string
        ratedId:
          type: string
        rating:
          type: integer
        review:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, taskId, raterId, ratedId, rating, createdAt]

    UserRatingsResponse:
      type: object
      properties:
        ratings:
          type: array
          items:
            $ref: "#/components/schemas/RatingResponse"
        averageRating:
          type: number
          nullable: true
        totalCount:
          type: integer
      required: [ratings, totalCount]

    SubmitRatingBody:
      type: object
      properties:
        taskId:
          type: integer
        ratedId:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        review:
          type: string
          nullable: true
      required: [taskId, ratedId, rating]

    SubmitReportBody:
      type: object
      properties:
        targetType:
          type: string
          enum: [user, task]
        targetId:
          type: string
        reason:
          type: string
        details:
          type: string
          nullable: true
      required: [targetType, targetId, reason]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImage:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
        town:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        tasksPosted:
          type: integer
        tasksCompleted:
          type: integer
        rating:
          type: number
          nullable: true
        reviewCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, username, tasksPosted, tasksCompleted, reviewCount, createdAt]

    UpdateProfileBody:
      type: object
      properties:
        bio:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
        town:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
