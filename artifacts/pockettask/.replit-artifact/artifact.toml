kind = "web"
previewPath = "/"
title = "PocketTask"
version = "1.0.0"
id = "artifacts/pockettask"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24145
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/pockettask run dev"

[services.env]
PORT = "24145"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/pockettask", "run", "build"]
publicDir = "artifacts/pockettask/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
