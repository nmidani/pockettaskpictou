kind = "web"
previewPath = "/"
title = "PocketTask"
version = "1.0.0"
id = "artifacts/api-server"
router = "path"

[[services]]
localPort = 3000
name = "web"
paths = ["/"]

[services.development]
run = "npm run dev"

[services.env]
PORT = "3000"

[services.production]
build = "npm run build:all"
run = "npm start"
