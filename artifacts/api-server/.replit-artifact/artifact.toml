kind = "web"
  previewPath = "/api-server/"
  title = "PocketTask"
  version = "1.0.0"
  id = "artifacts/api-server"
  router = "path"

  [[services]]
  localPort = 8081
  name = "web"
  paths = ["/"]

  [services.development]
  run = "NODE_ENV=development tsx /home/runner/workspace/src/index.ts"

  [services.env]
  PORT = "8081"

  [services.production]
  build = "npm run build:all"
  run = "npm start"
  